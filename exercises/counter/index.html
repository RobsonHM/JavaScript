<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Page title for browser tab -->
    <title> Robson Henrique SN: 76776 </title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Link to CSS file for counter styling -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>
        <h1>Counter</h1>
        <span id="value">0</span>

        <div class="button-container">
            <button class="btn" id="decrease">
                <i class="fas fa-minus-circle"></i> DECREASE
            </button>
            <button class="btn" id="reset">
                <i class="fas fa-undo"></i> RESET
            </button>
            <button class="btn" id="increase">
                <i class="fas fa-plus-circle"></i> INCREASE
            </button>
        </div>
    </main>

    <!-- Link to JavaScript file for counter logic -->
    <script src="script.js"></script>
</body>
</html>
